{% extends 'dashboard/base.html' %}

{% block header %}{{ title }}{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'dashboard_skills' %}" class="text-indigo-600 hover:text-indigo-800"><i class="fas fa-arrow-left"></i> Back to Skills</a>
</div>

<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8 max-w-xl">
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 gap-6">
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                <style>
                    #{{ field.id_for_label }} {
                        width: 100%;
                        padding: 0.5rem 0.75rem;
                        border-radius: 0.375rem;
                        border: 1px solid #d1d5db;
                        background-color: #f9fafb;
                    }
                    #{{ field.id_for_label }}:focus {
                        outline: none;
                        border-color: #6366f1;
                    }
                </style>
            </div>
            {% endfor %}
        </div>

        <div class="pt-4 flex justify-end">
            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded shadow hover:bg-indigo-700 transition">Save Skill</button>
        </div>
    </form>
</div>
{% endblock %}
